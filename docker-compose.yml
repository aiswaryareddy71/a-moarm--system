version: '3.8'

services:
  db:
    image: postgis/postgis:14-3.2
    environment:
      POSTGRES_PASSWORD: Revanth
      POSTGRES_DB: amaorm
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: amaorm
      DB_USER: postgres
      DB_PASS: Revanth
    depends_on:
      - db